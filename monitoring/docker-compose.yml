# =============================================================
# StayMate Monitoring Stack — Docker Compose
# =============================================================
# Runs Prometheus (metrics database) and Grafana (visualization)
# alongside your existing StayMate application.
#
# Usage:
#   cd monitoring
#   docker-compose up -d
#
# Ports:
#   Prometheus → http://localhost:9090
#   Grafana    → http://localhost:3001 (admin/admin)
# =============================================================

version: "3.8"

services:
  # ── Prometheus ──────────────────────────────────────────────
  # Time-series database that scrapes /actuator/prometheus
  # from your Spring Boot backend every 10–15 seconds.
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: staymate-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d" # Keep 15 days of data
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle" # Allows hot-reload via /-/reload
    extra_hosts:
      - "host.docker.internal:host-gateway" # Resolve host machine IP

  # ── Grafana ─────────────────────────────────────────────────
  # Visualization layer. Auto-provisions the Prometheus datasource
  # and a pre-built StayMate dashboard on first boot.
  grafana:
    image: grafana/grafana:10.4.1
    container_name: staymate-grafana
    restart: unless-stopped
    ports:
      - "3001:3000" # 3001 avoids conflict with Next.js
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
